name: lumina_coach
description: AI-powered communication coaching — Flutter + Supabase + BYOK Claude.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  supabase_flutter: ^2.8.4
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  intl: ^0.20.2
  fl_chart: ^0.69.2
  firebase_core: ^3.8.1
  firebase_crashlytics: ^4.2.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
